# Local Postgres for the checkpointer (Phase B persistence).
# Start it with:   docker compose up -d
# The matching DATABASE_URI is in each user project's .env.example.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
