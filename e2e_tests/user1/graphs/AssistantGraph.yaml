# AssistantGraph — a worker plus a judge with a quality loop.
#
# "Thin" YAML: only the graph TOPOLOGY lives here.
# Behaviour (model, prompt, tools) lives in the Python agents;
# names (types, reducers, agents, routers) are resolved by the registry.

name: AssistantGraph
description: A worker answers using tools; a judge validates and loops back when needed.
version: 1

# Shared state flowing between the nodes.
# `type`/`reducer` are NAMES resolved by the registry (add_messages = reducer).
# The judge writes `verdict`/`attempts`; the router reads them to continue or stop.
state:
  messages: { type: list, reducer: add_messages }
  verdict:  { type: str }
  attempts: { type: int, default: 0 }

# A node = an agent. The agent's configuration lives in the agent, not here.
nodes:
  worker: { agent: WorkerAgent }
  judge:  { agent: JudgeAgent }

# Edges: simple (from -> to) or conditional (a Python router picks the next node).
edges:
  - { from: START,  to: worker }
  - { from: worker, to: judge }
  - from: judge
    router: JudgeRouter           # RouterInterface impl: route(state) -> "worker" | "END"
    targets: [worker, END]
