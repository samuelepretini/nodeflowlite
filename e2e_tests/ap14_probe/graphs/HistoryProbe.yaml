# AP-14 probe graph — a no-LLM loop, so it runs deterministically with NO API key.
#
#   START -> probe -> (LoopRouter) -> probe | END
#
# Each pass of `probe` reads the thread's history from inside the node and records
# what it saw; the loop gives us several super-steps, i.e. several checkpoints to
# inspect via /state/history, /state/previous and /state/at/{id}.

name: HistoryProbe
description: AP-14 probe — in-node ctx.history/ctx.previous + external /state/* routes.
version: 1

# No declared state fields: the counter lives in the execution_data bag, which the
# framework auto-injects into every graph (reducer = merge).
state: {}

nodes:
  probe: { agent: CounterProbe }

edges:
  - { from: START, to: probe }
  - from: probe
    router: LoopRouter          # route(state) -> "probe" | "END"
    targets: [probe, END]
