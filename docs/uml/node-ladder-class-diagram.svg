<rect x="372" y="76" width="296" height="776" rx="8" fill="#F8F7F3" stroke="#D9D7CF" stroke-width="1" stroke-dasharray="3 4"/>
<rect x="692" y="76" width="296" height="776" rx="8" fill="#F8F7F3" stroke="#D9D7CF" stroke-width="1" stroke-dasharray="3 4"/>
<rect x="1012" y="76" width="296" height="776" rx="8" fill="#F8F7F3" stroke="#D9D7CF" stroke-width="1" stroke-dasharray="3 4"/>
<text x="200" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#7A786F">L0 · nodo NON-LLM</text>
<text x="520" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#7A786F">L1 · agente LLM (config-only)</text>
<text x="840" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#7A786F">L2 · agente LLM + hook</text>
<text x="1160" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#7A786F">L3 · agente LLM + I/O custom</text>

