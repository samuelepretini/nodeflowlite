<text x="1040" y="744" font-size="9.5" font-style="italic" fill="#D85A30">(e/o build_prompt) — I/O custom</text>

<!-- ================= purpose captions ================= -->
<rect x="68" y="760" width="264" height="84" rx="6" fill="#FFFCF7" stroke="#E0C9BC" stroke-width="1.1"/>
<text x="80" y="777" font-size="9.5" font-weight="700" fill="#A85A38">perché esiste</text>
<text x="80" y="791" font-size="9.3" fill="#5A4A42">Nessuna IA: implementi run(ctx) e scrivi TU</text>
<text x="80" y="803" font-size="9.3" fill="#5A4A42">tutta la logica (I/O, calcoli, glue del flusso).</text>
<text x="80" y="815" font-size="9.3" fill="#5A4A42">Per passi deterministici: leggere/scrivere</text>
<text x="80" y="827" font-size="9.3" fill="#5A4A42">dati, contare, orchestrare un loop.</text>

<rect x="388" y="760" width="264" height="84" rx="6" fill="#FFFCF7" stroke="#E0C9BC" stroke-width="1.1"/>
<text x="400" y="777" font-size="9.5" font-weight="700" fill="#A85A38">perché esiste</text>
<text x="400" y="791" font-size="9.3" fill="#5A4A42">Usa l'IA. Solo configurazione (MODEL,</text>
<text x="400" y="803" font-size="9.3" fill="#5A4A42">SYSTEM_PROMPT, TOOLS): è il framework a</text>
<text x="400" y="815" font-size="9.3" fill="#5A4A42">fare la chiamata LLM. Zero codice di logica</text>
<text x="400" y="827" font-size="9.3" fill="#5A4A42">— l'agente "standard", il caso più comune.</text>

<rect x="708" y="760" width="264" height="84" rx="6" fill="#FFFCF7" stroke="#E0C9BC" stroke-width="1.1"/>
<text x="720" y="777" font-size="9.5" font-weight="700" fill="#A85A38">perché esiste</text>
<text x="720" y="791" font-size="9.3" fill="#5A4A42">Usa l'IA + vuoi ganci attorno alla chiamata:</text>
<text x="720" y="803" font-size="9.3" fill="#5A4A42">preparare/validare prima (before), trasformare</text>
<text x="720" y="815" font-size="9.3" fill="#5A4A42">dopo (after), gestire l'errore (on_error).</text>
<text x="720" y="827" font-size="9.3" fill="#5A4A42">Per robustezza, retry, logging/telemetria.</text>

<rect x="1028" y="760" width="264" height="84" rx="6" fill="#FFFCF7" stroke="#E0C9BC" stroke-width="1.1"/>
<text x="1040" y="777" font-size="9.5" font-weight="700" fill="#A85A38">perché esiste</text>
<text x="1040" y="791" font-size="9.3" fill="#5A4A42">Usa l'IA ma vuoi controllare input/output:</text>
<text x="1040" y="803" font-size="9.3" fill="#5A4A42">override di build_prompt (come costruisci il</text>
<text x="1040" y="815" font-size="9.3" fill="#5A4A42">prompt) e/o on_result (come leggi la risposta).</text>
<text x="1040" y="827" font-size="9.3" fill="#5A4A42">Quando la configurazione di L1 non basta.</text>

<!-- ================= legend + notes ================= -->
<line x1="52" y1="866" x2="80" y2="866" stroke="#444441" stroke-width="1.3" marker-end="url(#tri)"/>
<text x="88" y="870" font-size="10.5" fill="#5F5E5A">extends (classe)</text>
<line x1="210" y1="866" x2="238" y2="866" stroke="#444441" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#tri)"/>
<text x="246" y="870" font-size="10.5" fill="#5F5E5A">implements (interfaccia)</text>
<rect x="410" y="859" width="14" height="13" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/><text x="430" y="870" font-size="10.5" fill="#5F5E5A">interface</text>
<rect x="500" y="859" width="14" height="13" rx="3" fill="#EEEDFE" stroke="#534AB7"/><text x="520" y="870" font-size="10.5" fill="#5F5E5A">astratta (framework)</text>
<rect x="640" y="859" width="14" height="13" rx="3" fill="#FAECE7" stroke="#993C1D"/><text x="660" y="870" font-size="10.5" fill="#5F5E5A">nodo utente</text>
<text x="52" y="892" font-size="10.5" font-style="italic" fill="#888780">L1 e L3 hanno la STESSA catena: cambia solo che L3 fa override di on_result/build_prompt. · Si può anche implementare NodeInterface direttamente (es. AttemptsCounterNode), saltando la scala.</text>
</svg>
