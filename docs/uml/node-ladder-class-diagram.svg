<svg viewBox="0 0 1400 904" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Scala dei nodi L0–L3 — dal nodo utente alla sua gerarchia</title>
<desc>Una colonna per livello (L0/L1/L2/L3): in basso il nodo implementato dall'utente, sopra l'intera catena di ereditarietà/implementazione fino a NodeInterface, ripetuta per colonna. Freccia continua = extends, tratteggiata = implements.</desc>
<defs>
<marker id="tri" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L12,6 L1,11 Z" fill="#ffffff" stroke="#444441" stroke-width="1.2"/></marker>
</defs>
<rect x="0" y="0" width="1400" height="904" fill="#ffffff"/>
<text x="40" y="24" font-size="13" font-weight="700" fill="#2C2C2A">Scala dei nodi L0–L3 — dal nodo utente (in basso) alla sua gerarchia (in alto)</text>
<text x="40" y="42" font-size="11" fill="#5F5E5A">Una colonna per livello. Si legge dal basso (il TUO nodo) verso l'alto (cosa eredita). Le classi comuni si ripetono di proposito. <tspan font-style="italic">——▷ extends · - - ▷ implements</tspan>.</text>

<!-- lanes -->
