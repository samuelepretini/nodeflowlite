<svg width="680" height="872" viewBox="0 0 680 872" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="680" height="872" fill="#ffffff"/>
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5F5E5A"/></marker>
  </defs>

  <!-- Box 0: framework adapter -->
  <rect x="40" y="46" width="600" height="152" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="60" y="76" font-size="15" font-weight="500" fill="#712B13">LangGraphStateHistory</text>
  <text x="250" y="76" font-size="12" fill="#993C1D">adapter · StateHistoryInterface</text>
  <text x="64" y="108" font-size="14" fill="#2C2C2A">_compiled</text><text x="250" y="108" font-size="12" fill="#5F5E5A">il grafo compilato</text>
  <text x="64" y="132" font-size="14" fill="#2C2C2A">_thread_id</text><text x="250" y="132" font-size="12" fill="#5F5E5A">legato a UN thread</text>
  <rect x="60" y="144" width="116" height="24" rx="5" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
  <text x="72" y="161" font-size="14" font-weight="500" fill="#412402">back(steps)</text>
  <text x="250" y="161" font-size="12" fill="#5F5E5A">risale il parent_config</text>
  <text x="64" y="190" font-size="12" fill="#5F5E5A">back →  saver.aget_tuple(_config())  →  CheckpointTuple</text>

  <line x1="120" y1="198" x2="120" y2="226" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="132" y="217" font-size="12" fill="#5F5E5A">ritorna</text>

  <!-- Box 1: CheckpointTuple -->
  <rect x="40" y="228" width="600" height="180" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
  <text x="60" y="258" font-size="15" font-weight="500" fill="#444441">CheckpointTuple</text>
  <text x="200" y="258" font-size="12" fill="#5F5E5A">NamedTuple · 5 campi</text>
  <text x="64" y="292" font-size="14" fill="#2C2C2A">config</text><text x="240" y="292" font-size="12" fill="#5F5E5A">{ thread_id, checkpoint_id }</text>
  <rect x="60" y="304" width="120" height="24" rx="5" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="72" y="321" font-size="14" font-weight="500" fill="#042C53">checkpoint</text>
  <text x="240" y="321" font-size="12" fill="#5F5E5A">lo stato vero e proprio</text>
  <text x="64" y="354" font-size="14" fill="#2C2C2A">metadata</text><text x="240" y="354" font-size="12" fill="#5F5E5A">{ source, step, writes }</text>
  <text x="64" y="378" font-size="14" fill="#2C2C2A">parent_config</text><text x="240" y="378" font-size="12" fill="#5F5E5A">punta allo step precedente</text>
  <text x="64" y="402" font-size="14" fill="#2C2C2A">pending_writes</text><text x="240" y="402" font-size="12" fill="#5F5E5A">scritture non consolidate</text>

  <line x1="120" y1="408" x2="120" y2="438" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="132" y="429" font-size="12" fill="#5F5E5A">apri</text>

  <!-- Box 2: checkpoint -->
  <rect x="40" y="440" width="600" height="180" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="60" y="470" font-size="15" font-weight="500" fill="#0C447C">checkpoint</text>
  <text x="150" y="470" font-size="12" fill="#185FA5">Checkpoint · dict</text>
  <text x="64" y="504" font-size="14" fill="#2C2C2A">id</text><text x="240" y="504" font-size="12" fill="#5F5E5A">id del checkpoint</text>
  <text x="64" y="528" font-size="14" fill="#2C2C2A">ts</text><text x="240" y="528" font-size="12" fill="#5F5E5A">timestamp</text>
  <rect x="60" y="540" width="150" height="24" rx="5" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="72" y="557" font-size="14" font-weight="500" fill="#04342C">channel_values</text>
  <text x="240" y="557" font-size="12" fill="#5F5E5A">i valori dei canali</text>
  <text x="64" y="590" font-size="14" fill="#2C2C2A">channel_versions</text><text x="240" y="590" font-size="12" fill="#5F5E5A">versione di ogni canale</text>
  <text x="64" y="614" font-size="14" fill="#2C2C2A">versions_seen</text><text x="240" y="614" font-size="12" fill="#5F5E5A">cosa ha già visto ogni nodo</text>

  <line x1="135" y1="620" x2="135" y2="650" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="147" y="641" font-size="12" fill="#5F5E5A">apri</text>

  <!-- Box 3: channel_values -->
  <rect x="40" y="652" width="600" height="194" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="60" y="682" font-size="15" font-weight="500" fill="#085041">channel_values</text>
  <text x="190" y="682" font-size="12" fill="#0F6E56">i canali = le variabili di stato</text>
  <text x="64" y="710" font-size="12" fill="#5F5E5A">i tuoi (dichiarati in state:)</text>
  <rect x="64" y="720" width="84" height="24" rx="5" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="76" y="737" font-size="14" font-weight="500" fill="#26215C">messages</text>
  <rect x="156" y="720" width="70" height="24" rx="5" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="168" y="737" font-size="14" font-weight="500" fill="#26215C">verdict</text>
  <rect x="234" y="720" width="82" height="24" rx="5" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="246" y="737" font-size="14" font-weight="500" fill="#26215C">attempts</text>
  <text x="64" y="774" font-size="12" fill="#5F5E5A">interni di LangGraph</text>
  <rect x="64" y="784" width="86" height="24" rx="5" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
  <text x="76" y="801" font-size="14" font-weight="500" fill="#2C2C2A">__start__</text>
  <rect x="158" y="784" width="184" height="24" rx="5" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
  <text x="170" y="801" font-size="14" font-weight="500" fill="#2C2C2A">branch:to:enrichWorker</text>
  <text x="64" y="834" font-size="12" fill="#5F5E5A">_values tiene solo i tuoi · scarta le chiavi con  :  e  __</text>
</svg>
