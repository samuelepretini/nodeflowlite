<text x="1005" y="125" text-anchor="middle" font-size="10" fill="#888780">scaffold</text>
<line x1="798" y1="133" x2="1212" y2="133" stroke="#5F5E5A" stroke-width="1"/>
<text x="802" y="151" font-size="10.5" fill="#2C2C2A">costanti-template (stringhe):</text>
<text x="802" y="168" font-size="10.5" fill="#2C2C2A">COUNTER_NODE · BASIC_WORKER · HOOKED_WORKER</text>
<text x="802" y="185" font-size="10.5" fill="#2C2C2A">SHAPING_WORKER · JUDGE_AGENT · QUALITY_ROUTER</text>
<text x="802" y="202" font-size="10.5" fill="#2C2C2A">GRAPH_YAML · PLATFORM_MANAGER · ENV_EXAMPLE</text>
<text x="802" y="219" font-size="10.5" fill="#2C2C2A">README · *_INIT · PROJECT_NAME_PLACEHOLDER</text>
<text x="802" y="237" font-size="10" font-style="italic" fill="#888780">una stringa per ogni file emesso</text>

