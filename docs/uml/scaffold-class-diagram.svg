<!-- PlatformManager.py (composition root) -->
<rect x="80" y="490" width="380" height="130" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
<text x="270" y="507" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">«composition root»</text>
<text x="270" y="525" text-anchor="middle" font-size="12.5" font-weight="700" fill="#26215C">PlatformManager.py</text>
<text x="270" y="540" text-anchor="middle" font-size="9.5" fill="#7F77DD">radice del progetto</text>
<line x1="88" y1="548" x2="452" y2="548" stroke="#534AB7" stroke-width="1"/>
<text x="92" y="566" font-size="10.5" fill="#26215C">build_factory(): StaticRegistry +</text>
<text x="92" y="582" font-size="10.5" fill="#26215C">YamlGraphProviderFactory + checkpointer</text>
<text x="92" y="598" font-size="10.5" fill="#26215C">build_transport(): HttpTransport(port=8000)</text>
<text x="92" y="614" font-size="10" font-style="italic" fill="#7F77DD">qui l'utente registra i nomi dei nodi/router</text>

<!-- AbstractPlatformManager (boundary) -->
<line x1="460" y1="540" x2="498" y2="540" stroke="#444441" stroke-width="1.3" marker-end="url(#tri)"/>
<text x="462" y="534" font-size="9" font-style="italic" fill="#5F5E5A">estende</text>
<rect x="500" y="490" width="340" height="100" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="670" y="506" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">«abstract · confine»</text>
<text x="670" y="524" text-anchor="middle" font-size="12.5" font-weight="700" fill="#26215C">AbstractPlatformManager</text>
<text x="670" y="539" text-anchor="middle" font-size="9.5" fill="#7F77DD">core.platform</text>
<line x1="508" y1="547" x2="832" y2="547" stroke="#534AB7" stroke-width="1"/>
<text x="512" y="565" font-size="10.5" fill="#26215C">run() (template) · build_factory/build_transport</text>
<text x="512" y="581" font-size="10" font-style="italic" fill="#7F77DD">vedi diagramma activation-sequence</text>

<!-- wiring note -->
<rect x="860" y="490" width="340" height="130" rx="6" fill="#F4FBF8" stroke="#0F6E56" stroke-width="1.1"/>
<text x="872" y="508" font-size="10" font-weight="700" fill="#0F6E56">l'output ri-aggancia tutto il framework</text>
<text x="872" y="526" font-size="9.5" fill="#04342C">Il PlatformManager.py generato importa e cabla:</text>
<text x="872" y="541" font-size="9.5" fill="#04342C">• core (platform/provider/registry)</text>
<text x="872" y="556" font-size="9.5" fill="#04342C">• persistence (Memory/Postgres checkpointer)</text>
<text x="872" y="571" font-size="9.5" fill="#04342C">• connection (HttpTransport)</text>
<text x="872" y="588" font-size="9.5" font-style="italic" fill="#1D9E75">gli agenti generati seguono la scala L0–L3</text>
<text x="872" y="603" font-size="9.5" font-style="italic" fill="#1D9E75">(vedi node-ladder).</text>

<!-- ===== legend ===== -->
<line x1="60" y1="734" x2="76" y2="734" stroke="#444441" stroke-width="1.3" marker-end="url(#tri)"/>
<text x="84" y="738" font-size="10.5" fill="#5F5E5A">extends</text>
<line x1="160" y1="734" x2="176" y2="734" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="184" y="738" font-size="10.5" fill="#5F5E5A">crea / legge / scrive</text>
<text x="340" y="738" font-size="10.5" font-style="italic" fill="#888780">Il generatore conosce solo stringhe (project_templates): non importa il runtime, quindi può girare in una cartella vuota.</text>
