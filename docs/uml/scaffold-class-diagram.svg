<svg viewBox="0 0 1300 760" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>scaffold — class diagram</title>
<desc>Il package scaffold: un GENERATORE di codice. main() (CLI) crea ProjectScaffolder, che legge le costanti-template di project_templates e scrive lo scheletro di un progetto utente (agents/routers/tools/graphs + PlatformManager.py). Non importa il runtime, non sovrascrive.</desc>
<defs>
<marker id="tri" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L12,6 L1,11 Z" fill="#ffffff" stroke="#444441" stroke-width="1.2"/></marker>
<marker id="vee" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L10,5 L1,9" fill="none" stroke="#5F5E5A" stroke-width="1.4"/></marker>
</defs>
<rect x="0" y="0" width="1300" height="760" fill="#ffffff"/>
<text x="40" y="24" font-size="13" font-weight="700" fill="#2C2C2A">scaffold · generatore del progetto utente — class diagram</text>
<text x="40" y="42" font-size="11" fill="#5F5E5A">È un <tspan font-weight="700">code generator</tspan>: scrive i file che l'utente terrà nel proprio repo. NON importa il runtime del framework e NON sovrascrive file esistenti (ri-eseguibile). Seme del futuro <tspan font-style="italic">agent-platform new</tspan>.</text>

<!-- ===== arrows ===== -->
<line x1="340" y1="134" x2="396" y2="134" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="344" y="128" font-size="9.5" font-style="italic" fill="#5F5E5A">crea · scaffold()</text>
<line x1="730" y1="130" x2="786" y2="130" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="734" y="124" font-size="9.5" font-style="italic" fill="#5F5E5A">legge costanti</text>
<line x1="565" y1="226" x2="565" y2="288" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="571" y="262" font-size="9.5" font-style="italic" fill="#5F5E5A">scrive (se assente)</text>

<!-- ===== main() ===== -->
<rect x="60" y="76" width="280" height="116" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="200" y="92" text-anchor="middle" font-size="10.5" font-style="italic" fill="#5F5E5A">«fn · CLI»</text>
<text x="200" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#2C2C2A">main(argv)</text>
<text x="200" y="125" text-anchor="middle" font-size="10" fill="#888780">scaffold.__main__</text>
<line x1="68" y1="133" x2="332" y2="133" stroke="#5F5E5A" stroke-width="1"/>
<text x="72" y="151" font-size="10.5" fill="#2C2C2A">python -m agent_platform.scaffold</text>
<text x="72" y="168" font-size="10.5" fill="#2C2C2A">[TARGET_DIR] [PROJECT_NAME]</text>
<text x="72" y="185" font-size="10" font-style="italic" fill="#888780">stampa i file creati</text>

<!-- ===== ProjectScaffolder ===== -->
<rect x="400" y="76" width="330" height="150" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="565" y="92" text-anchor="middle" font-size="10.5" font-style="italic" fill="#534AB7">«class»</text>
<text x="565" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#26215C">ProjectScaffolder</text>
<text x="565" y="125" text-anchor="middle" font-size="10" fill="#7F77DD">scaffold</text>
<line x1="408" y1="133" x2="722" y2="133" stroke="#534AB7" stroke-width="1"/>
<text x="412" y="151" font-size="11" fill="#26215C">- _target_dir  - _project_name</text>
<text x="412" y="169" font-size="11" fill="#26215C">+ scaffold() → list[Path]</text>
<text x="412" y="187" font-size="11" fill="#26215C">_planned_files · _render</text>
<text x="412" y="205" font-size="11" fill="#26215C">_write_if_absent (mai sovrascrive)</text>
<text x="412" y="221" font-size="10" font-style="italic" fill="#7F77DD">_render: sostituisce __PROJECT_NAME__</text>

<!-- ===== project_templates ===== -->
<rect x="790" y="76" width="430" height="168" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
