<rect x="490" y="699" width="20" height="13" rx="3" fill="#ffffff" stroke="#5F5E5A" stroke-dasharray="4 3"/><text x="516" y="710" font-size="10.5" fill="#5F5E5A">confine (core) / esterno (langgraph, psycopg)</text>
<text x="60" y="734" font-size="10.5" font-style="italic" fill="#888780">Annidamento: Factory.open() ⊃ Checkpointer.open() ⊃ Pool.open() — la connessione vive esattamente quanto i grafi serviti.</text>
