<text x="40" y="930" font-size="10.5" font-style="italic" fill="#888780">Flusso: POST /invoke → crea HttpConnection (channel) + GraphExecutor(runtime, channel) → executor.run() → reply dal payload → InvokeResponse.</text>
<text x="40" y="950" font-size="10.5" font-style="italic" fill="#888780">HttpTransport ⟹ TransportInterface · HttpConnection ⟹ ConnectionInterface. Il core resta agnostico rispetto a FastAPI.</text>
