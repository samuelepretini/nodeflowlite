<svg viewBox="0 0 1320 980" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>connection (HTTP) — class diagram</title>
<desc>Il package connection e' l'adapter HTTP: implementa TransportInterface e ConnectionInterface del core e ne consuma le altre porte. Box tratteggiato = classe di confine (core).</desc>
<defs>
<marker id="tri" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L12,6 L1,11 Z" fill="#ffffff" stroke="#444441" stroke-width="1.2"/></marker>
<marker id="vee" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L10,5 L1,9" fill="none" stroke="#5F5E5A" stroke-width="1.4"/></marker>
</defs>
<rect x="0" y="0" width="1320" height="980" fill="#ffffff"/>
<text x="40" y="24" font-size="13" font-weight="700" fill="#2C2C2A">connection · HTTP channel — class diagram</text>
<text x="40" y="42" font-size="11" fill="#5F5E5A">Adapter HTTP (Ports &amp; Adapters): implementa <tspan font-style="italic">TransportInterface</tspan> + <tspan font-style="italic">ConnectionInterface</tspan> del core e ne consuma le altre porte. Il core NON dipende da qui.</text>

