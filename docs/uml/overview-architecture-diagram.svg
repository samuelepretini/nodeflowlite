<svg viewBox="0 0 1500 980" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>AgenticPlatform — vista d'insieme dei sottosistemi (Ports &amp; Adapters)</title>
<desc>Mappa dei sottosistemi: il core (dominio + porte) al centro; connection (adapter HTTP, inbound) e persistence (adapter checkpointer, outbound) che implementano le porte; la composition root (PlatformManager utente, generato da scaffold); gli engine esterni. Tutte le frecce puntano verso il core o verso gli engine.</desc>
<defs>
<marker id="tri" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L12,6 L1,11 Z" fill="#ffffff" stroke="#444441" stroke-width="1.2"/></marker>
<marker id="vee" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L10,5 L1,9" fill="none" stroke="#5F5E5A" stroke-width="1.4"/></marker>
</defs>
<rect x="0" y="0" width="1500" height="980" fill="#ffffff"/>
<text x="40" y="24" font-size="13" font-weight="700" fill="#2C2C2A">AgenticPlatform · vista d'insieme dei sottosistemi (Ports &amp; Adapters)</text>
<text x="40" y="42" font-size="11" fill="#5F5E5A"><tspan font-weight="700">Il core non dipende da nessun adapter né engine</tspan>: le frecce puntano VERSO il core (implementano le porte) o verso gli engine esterni. Sotto ogni box: il diagramma di dettaglio.</text>

<!-- ===== arrows ===== -->
<!-- scaffold -> project -->
<line x1="292" y1="138" x2="332" y2="138" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="296" y="132" font-size="9.5" font-style="italic" fill="#5F5E5A">genera</text>
<!-- project -> core -->
<line x1="600" y1="232" x2="660" y2="276" stroke="#444441" stroke-width="1.5" marker-end="url(#vee)"/>
<text x="606" y="258" font-size="9.5" font-style="italic" fill="#5F5E5A">run(): cabla + serve</text>
<!-- connection -> core (implements) -->
<line x1="500" y1="430" x2="548" y2="430" stroke="#444441" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#tri)"/>
<text x="496" y="416" font-size="9.5" font-style="italic" fill="#5F5E5A">Transport/Connection ⟹</text>
<!-- persistence -> core (implements) -->
<line x1="1000" y1="430" x2="952" y2="430" stroke="#444441" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#tri)"/>
<text x="868" y="416" font-size="9.5" font-style="italic" fill="#5F5E5A">⟸ CheckpointerProvider</text>
<!-- core -> engines -->
<line x1="640" y1="616" x2="560" y2="660" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="486" y="648" font-size="9.5" font-style="italic" fill="#5F5E5A">LLM (create_agent)</text>
<line x1="860" y1="616" x2="900" y2="660" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="906" y="648" font-size="9.5" font-style="italic" fill="#5F5E5A">engine del grafo</text>
<!-- connection -> fastapi -->
<line x1="250" y1="600" x2="250" y2="660" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<!-- persistence -> postgres -->
<line x1="1250" y1="600" x2="1250" y2="660" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<!-- persistence -> langgraph savers -->
<line x1="1100" y1="600" x2="1010" y2="660" stroke="#5F5E5A" stroke-width="1.2" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="1016" y="648" font-size="9" font-style="italic" fill="#888780">saver PG</text>

<!-- ===== TOP: scaffold + composition root + reserved ===== -->
<rect x="60" y="84" width="232" height="108" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="176" y="100" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">«generatore»</text>
<text x="176" y="118" text-anchor="middle" font-size="12.5" font-weight="700" fill="#26215C">scaffold</text>
<line x1="68" y1="126" x2="284" y2="126" stroke="#534AB7" stroke-width="1"/>
<text x="72" y="143" font-size="10" fill="#26215C">ProjectScaffolder + template</text>
<text x="72" y="158" font-size="10" fill="#26215C">crea lo scheletro del progetto</text>
<text x="72" y="173" font-size="9.5" font-style="italic" fill="#7F77DD">non importa il runtime</text>
<text x="72" y="187" font-size="9" fill="#888780">→ scaffold-class-diagram</text>

<rect x="332" y="78" width="540" height="154" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1.6"/>
<text x="602" y="94" text-anchor="middle" font-size="10" font-style="italic" fill="#993C1D">«composition root» — progetto utente</text>
<text x="602" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#4A1B0C">&lt;Mio&gt;PlatformManager  +  agents / routers / tools / graphs</text>
<line x1="340" y1="120" x2="864" y2="120" stroke="#993C1D" stroke-width="1"/>
<text x="344" y="138" font-size="10.5" fill="#4A1B0C">PlatformManager <tspan font-style="italic">extends</tspan> core.platform · build_factory()/build_transport()</text>
<text x="344" y="155" font-size="10.5" fill="#4A1B0C">run(): cabla StaticRegistry + YamlGraphProviderFactory + checkpointer + HttpTransport</text>
<text x="344" y="172" font-size="10.5" fill="#4A1B0C">nodi/router/tool dell'utente — scala L0–L3</text>
<text x="344" y="189" font-size="10.5" fill="#4A1B0C">i grafi (YAML) descrivono solo la topologia</text>
<text x="344" y="208" font-size="9" font-style="italic" fill="#D85A30">→ node-ladder · activation-sequence · execution-sequence</text>
<text x="344" y="223" font-size="9" fill="#888780">l'utente scrive QUESTO; scaffold ne dà lo scheletro</text>

<rect x="912" y="84" width="252" height="108" rx="6" fill="#F4F4F2" stroke="#B8B6AE" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="1038" y="100" text-anchor="middle" font-size="10" font-style="italic" fill="#8C8A82">«vuoto/riservato»</text>
<text x="1038" y="118" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5A5852">config</text>
<line x1="920" y1="126" x2="1156" y2="126" stroke="#B8B6AE" stroke-width="1"/>
<text x="924" y="144" font-size="10" fill="#7A786F">package vuoto: oggi la config</text>
<text x="924" y="159" font-size="10" fill="#7A786F">vive sparsa (settings/env)</text>
<text x="924" y="186" font-size="9" fill="#888780">→ config-class-diagram</text>

<rect x="1184" y="84" width="252" height="108" rx="6" fill="#F4F4F2" stroke="#B8B6AE" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="1310" y="100" text-anchor="middle" font-size="10" font-style="italic" fill="#8C8A82">«vuoto/riservato»</text>
<text x="1310" y="118" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5A5852">tools</text>
<line x1="1192" y1="126" x2="1428" y2="126" stroke="#B8B6AE" stroke-width="1"/>
<text x="1196" y="144" font-size="10" fill="#7A786F">tools.builtin / memory / registry</text>
<text x="1196" y="159" font-size="10" fill="#7A786F">solo __init__.py (da decidere)</text>
<text x="1196" y="186" font-size="9" fill="#888780">i ToolInterface utente vivono nel progetto</text>

<!-- ===== MIDDLE: connection | CORE | persistence ===== -->
<!-- connection -->
<rect x="60" y="270" width="440" height="320" rx="8" fill="#FDEBD8" stroke="#9A5B0E" stroke-width="1.6"/>
<text x="280" y="290" text-anchor="middle" font-size="10.5" font-style="italic" fill="#9A5B0E">«adapter primario · inbound»</text>
<text x="280" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#5A360A">connection (HTTP)</text>
<line x1="76" y1="320" x2="484" y2="320" stroke="#9A5B0E" stroke-width="1"/>
<text x="80" y="342" font-size="11" fill="#5A360A">Riceve le chiamate ed espone i grafi via HTTP.</text>
<text x="80" y="366" font-size="11" fill="#5A360A">• HttpTransport  ⟹ TransportInterface</text>
<text x="80" y="388" font-size="11" fill="#5A360A">• HttpConnection ⟹ ConnectionInterface</text>
<text x="80" y="410" font-size="11" fill="#5A360A">• router /graphs/{name}/invoke · /state/*</text>
<text x="80" y="432" font-size="11" fill="#5A360A">• create_app (FastAPI) · verify_token · DTO</text>
<text x="80" y="462" font-size="10.5" font-style="italic" fill="#9A5B0E">Guida il core: invoke → GraphExecutor → runtime.</text>
<text x="80" y="478" font-size="10.5" font-style="italic" fill="#9A5B0E">Il core non sa che dietro c'è FastAPI.</text>
<rect x="80" y="500" width="400" height="72" rx="6" fill="#FFF6EA" stroke="#C07A1E" stroke-width="1"/>
<text x="88" y="518" font-size="10" font-weight="700" fill="#7A4A0A">engine: FastAPI + uvicorn</text>
<text x="88" y="535" font-size="9.5" fill="#5A360A">create_app monta i router; uvicorn serve</text>
<text x="88" y="550" font-size="9.5" fill="#5A360A">fino allo shutdown (semaforo verde).</text>
<text x="88" y="567" font-size="9" fill="#888780">→ connection-class-diagram</text>

<!-- CORE -->
<rect x="520" y="258" width="460" height="344" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
<text x="750" y="278" text-anchor="middle" font-size="10.5" font-style="italic" fill="#534AB7">dominio framework-free + PORTE (hub)</text>
<text x="750" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="#26215C">core</text>
<line x1="536" y1="308" x2="964" y2="308" stroke="#534AB7" stroke-width="1"/>
<text x="540" y="328" font-size="10.5" font-weight="700" fill="#3F3795">PORTE · core.interface</text>
<text x="540" y="343" font-size="10" fill="#26215C">15 contratti (Loader/Builder/Runtime/Provider/Registry/Node/Router/Tool/State/…)</text>
<text x="540" y="366" font-size="10.5" font-weight="700" fill="#3F3795">DOMINIO</text>
<text x="540" y="381" font-size="10" fill="#26215C">core.DTO (GraphDTO…) · core.state (State/NodeContext/ExecutionData)</text>
<text x="540" y="395" font-size="10" fill="#26215C">core.abstract (scala nodi L0–L3)</text>
<text x="540" y="418" font-size="10.5" font-weight="700" fill="#3F3795">PIPELINE DI BUILD</text>
<text x="540" y="433" font-size="10" fill="#26215C">core.loader → core.builder · core.registry · core.provider</text>
<text x="540" y="456" font-size="10.5" font-weight="700" fill="#3F3795">RUNTIME &amp; AVVIO</text>
<text x="540" y="471" font-size="10" fill="#26215C">core.runtime (LangGraphRuntime · StateHistory · GraphExecutor)</text>
<text x="540" y="485" font-size="10" fill="#26215C">core.activation · core.platform (facciata AbstractPlatformManager)</text>
<rect x="540" y="500" width="420" height="86" rx="6" fill="#F6F5FE" stroke="#7F77DD" stroke-width="1"/>
<text x="548" y="518" font-size="10" font-weight="700" fill="#3F3795">engine dietro le porte del core:</text>
<text x="548" y="534" font-size="9.5" fill="#26215C">core.builder/runtime → LangGraph (StateGraph, checkpointer)</text>
<text x="548" y="549" font-size="9.5" fill="#26215C">core.abstract → LangChain (create_agent, ChatOpenAI)</text>
<text x="548" y="566" font-size="9" fill="#888780">→ core · types-hierarchy · node-ladder · ap14-statehistory</text>
<text x="548" y="580" font-size="9" font-style="italic" fill="#7F77DD">isolati dietro GraphRuntimeInterface, mai esposti</text>

<!-- persistence -->
<rect x="1000" y="270" width="440" height="320" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
<text x="1220" y="290" text-anchor="middle" font-size="10.5" font-style="italic" fill="#534AB7">«adapter secondario · outbound»</text>
<text x="1220" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#26215C">persistence</text>
<line x1="1016" y1="320" x2="1424" y2="320" stroke="#534AB7" stroke-width="1"/>
<text x="1020" y="342" font-size="11" fill="#26215C">Persiste lo stato dei thread (checkpoint).</text>
<text x="1020" y="366" font-size="11" fill="#26215C">• Memory/PostgresCheckpointerProvider</text>
<text x="1020" y="382" font-size="11" fill="#26215C">  ⟹ CheckpointerProviderInterface (core)</text>
<text x="1020" y="404" font-size="11" fill="#26215C">• db: pool psycopg (porta INTERNA)</text>
<text x="1020" y="426" font-size="11" fill="#26215C">• repositories: riservato (stesso pool)</text>
<text x="1020" y="456" font-size="10.5" font-style="italic" fill="#7F77DD">IoC: il core sceglie Memory (dev) o Postgres</text>
<text x="1020" y="472" font-size="10.5" font-style="italic" fill="#7F77DD">(prod, se DATABASE_URI). Cicli di vita annidati.</text>
<rect x="1020" y="494" width="400" height="78" rx="6" fill="#F6F5FE" stroke="#7F77DD" stroke-width="1"/>
<text x="1028" y="512" font-size="10" font-weight="700" fill="#3F3795">engine: LangGraph savers + psycopg/Postgres</text>
<text x="1028" y="529" font-size="9.5" fill="#26215C">MemorySaver · AsyncPostgresSaver(pool)</text>
<text x="1028" y="544" font-size="9.5" fill="#26215C">AsyncConnectionPool (psycopg)</text>
<text x="1028" y="565" font-size="9" fill="#888780">→ persistence-class-diagram</text>

<!-- ===== BOTTOM: external engines ===== -->
<rect x="120" y="662" width="280" height="98" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="260" y="680" text-anchor="middle" font-size="10" font-style="italic" fill="#854F0B">«external»</text>
<text x="260" y="699" text-anchor="middle" font-size="12.5" font-weight="700" fill="#412402">FastAPI + uvicorn</text>
<line x1="128" y1="707" x2="392" y2="707" stroke="#854F0B" stroke-width="1"/>
<text x="132" y="725" font-size="10" fill="#412402">server HTTP del canale</text>
<text x="132" y="741" font-size="9.5" font-style="italic" fill="#BA7517">usato da connection</text>

<rect x="430" y="662" width="290" height="98" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="575" y="680" text-anchor="middle" font-size="10" font-style="italic" fill="#854F0B">«external»</text>
<text x="575" y="699" text-anchor="middle" font-size="12.5" font-weight="700" fill="#412402">LangChain</text>
<line x1="438" y1="707" x2="712" y2="707" stroke="#854F0B" stroke-width="1"/>
<text x="442" y="725" font-size="10" fill="#412402">create_agent · ChatOpenAI (OpenRouter)</text>
<text x="442" y="741" font-size="9.5" font-style="italic" fill="#BA7517">usato da core.abstract (nodi LLM)</text>

<rect x="750" y="662" width="290" height="98" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="895" y="680" text-anchor="middle" font-size="10" font-style="italic" fill="#854F0B">«external»</text>
<text x="895" y="699" text-anchor="middle" font-size="12.5" font-weight="700" fill="#412402">LangGraph</text>
<line x1="758" y1="707" x2="1032" y2="707" stroke="#854F0B" stroke-width="1"/>
<text x="762" y="725" font-size="10" fill="#412402">StateGraph · compiled · checkpointer</text>
<text x="762" y="741" font-size="9.5" font-style="italic" fill="#BA7517">il MOTORE — dietro core.builder/runtime</text>

<rect x="1070" y="662" width="330" height="98" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="1235" y="680" text-anchor="middle" font-size="10" font-style="italic" fill="#854F0B">«external»</text>
<text x="1235" y="699" text-anchor="middle" font-size="12.5" font-weight="700" fill="#412402">Postgres + psycopg</text>
<line x1="1078" y1="707" x2="1392" y2="707" stroke="#854F0B" stroke-width="1"/>
<text x="1082" y="725" font-size="10" fill="#412402">DB di stato (prod) · connection pool</text>
<text x="1082" y="741" font-size="9.5" font-style="italic" fill="#BA7517">usato da persistence</text>

<!-- ===== bottom index / legend ===== -->
<rect x="60" y="792" width="1376" height="150" rx="8" fill="#FAFAF8" stroke="#D9D7CF" stroke-width="1.1"/>
<text x="76" y="814" font-size="11.5" font-weight="700" fill="#7A786F">Indice dei diagrammi in docs/uml/</text>
<text x="76" y="836" font-size="10" fill="#5A5852"><tspan font-weight="700">core</tspan> — pipeline build + composizione + nodi/state</text>
<text x="76" y="853" font-size="10" fill="#5A5852"><tspan font-weight="700">types-hierarchy</tspan> — interfacce → implementazioni + astratte</text>
<text x="76" y="870" font-size="10" fill="#5A5852"><tspan font-weight="700">node-ladder</tspan> — scala nodi L0–L3 per livello</text>
<text x="76" y="887" font-size="10" fill="#5A5852"><tspan font-weight="700">ap14-statehistory</tspan> — recupero stato + ctx-first</text>
<text x="500" y="836" font-size="10" fill="#5A5852"><tspan font-weight="700">connection</tspan> — adapter HTTP (router, DTO, transport)</text>
<text x="500" y="853" font-size="10" fill="#5A5852"><tspan font-weight="700">persistence</tspan> — checkpointer + connection pool</text>
<text x="500" y="870" font-size="10" fill="#5A5852"><tspan font-weight="700">config</tspan> — dove vive la configurazione (oggi sparsa)</text>
<text x="500" y="887" font-size="10" fill="#5A5852"><tspan font-weight="700">scaffold</tspan> — generatore del progetto utente</text>
<text x="920" y="836" font-size="10" fill="#5A5852"><tspan font-weight="700">activation-sequence</tspan> — avvio (run → serve)</text>
<text x="920" y="853" font-size="10" fill="#5A5852"><tspan font-weight="700">execution-sequence</tspan> — esecuzione di un grafo</text>
<text x="920" y="877" font-size="10" font-style="italic" fill="#888780">Due percorsi vivi: AVVIO e ESECUZIONE.</text>
<line x1="76" y1="906" x2="92" y2="906" stroke="#444441" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#tri)"/>
<text x="100" y="910" font-size="10" fill="#5F5E5A">implementa la porta</text>
<line x1="250" y1="906" x2="266" y2="906" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#vee)"/>
<text x="274" y="910" font-size="10" fill="#5F5E5A">dipende da / usa</text>
<line x1="410" y1="906" x2="426" y2="906" stroke="#444441" stroke-width="1.5" marker-end="url(#vee)"/>
<text x="434" y="910" font-size="10" fill="#5F5E5A">avvio (run)</text>
<text x="560" y="910" font-size="10" font-style="italic" fill="#888780">Regola d'oro: nessuna freccia esce dal core verso un adapter — il dominio resta puro.</text>
</svg>
